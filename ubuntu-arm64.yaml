base:
  - ./lima-common-provision.yaml

vmType: "vz"
arch: "aarch64"
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 4
memory: "8GiB"
disk: "80GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-arm64.img"
    arch: "aarch64"

mountType: "virtiofs"
