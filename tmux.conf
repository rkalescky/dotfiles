# Prefer fish from PATH (Homebrew/Pixi), fallback to current shell.
run-shell 'shell_path="${SHELL:-/bin/sh}"; fish_path="$(command -v fish 2>/dev/null || true)"; selected_shell="${fish_path:-$shell_path}"; tmux set -g default-shell "$selected_shell"; tmux set -g default-command "$selected_shell"'

# Use mouse mode
set -g mouse on

# Open new panes in the same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Use Emacs bindings
set -g mode-keys emacs
set -g status-keys emacs

# Fix copy and paste
set-option -g allow-passthrough on

# Set Catppuccin theme
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_window_text " #{window_name}"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
