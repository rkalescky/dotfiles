---
- name: Install global Pixi packages (MVP)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    pixi_bin: "{{ lookup('env', 'HOME') }}/.pixi/bin/pixi"
    catppuccin_tmux_version: v2.1.3
    catppuccin_tmux_dest: "{{ lookup('env', 'HOME') }}/.config/tmux/plugins/catppuccin/tmux"
    catppuccin_fish_dest: "{{ lookup('env', 'HOME') }}/.config/fish/themes/catppuccin"
    catppuccin_btop_dest: "{{ lookup('env', 'HOME') }}/.config/btop/catppuccin"
    local_bin_dir: "{{ lookup('env', 'HOME') }}/.local/bin"
    cargo_home: "{{ lookup('env', 'HOME') }}/.cargo"
    rustup_home: "{{ lookup('env', 'HOME') }}/.rustup"
    rustup_bin: "{{ cargo_home }}/bin/rustup"
    codex_os: "{{ lookup('pipe', 'uname -s') }}"
    codex_arch: "{{ lookup('pipe', 'uname -m') }}"
    brew_bin_prefix: "/opt/homebrew/bin:/usr/local/bin"
    bootstrap_shell_path: "{{ brew_bin_prefix if codex_os == 'Darwin' else '' }}{{ ':' if codex_os == 'Darwin' else '' }}{{ cargo_home }}/bin:{{ lookup('env', 'HOME') }}/.pixi/bin:{{ lookup('env', 'PATH') }}"
    rustup_target: "{{ 'x86_64-apple-darwin' if codex_os == 'Darwin' and codex_arch == 'x86_64' else ('aarch64-apple-darwin' if codex_os == 'Darwin' and codex_arch == 'arm64' else ('x86_64-unknown-linux-gnu' if codex_os == 'Linux' and codex_arch == 'x86_64' else ('aarch64-unknown-linux-gnu' if codex_os == 'Linux' and codex_arch in ['aarch64', 'arm64'] else ''))) }}"
    rustup_download_url: "https://static.rust-lang.org/rustup/dist/{{ rustup_target }}/rustup-init"
    rustup_download_sha256_url: "{{ rustup_download_url }}.sha256"
    codex_linux_arch: "{{ 'x86_64' if codex_arch == 'x86_64' else ('aarch64' if codex_arch in ['aarch64', 'arm64'] else '') }}"
    codex_linux_asset: "codex-{{ codex_linux_arch }}-unknown-linux-musl.tar.gz"
    codex_linux_download_url: "https://github.com/openai/codex/releases/latest/download/{{ codex_linux_asset }}"
    gh_linux_arch: "{{ 'amd64' if codex_arch == 'x86_64' else ('arm64' if codex_arch in ['aarch64', 'arm64'] else '') }}"
    gh_release_api_url: "https://api.github.com/repos/cli/cli/releases/latest"
    bootstrap_is_root: "{{ lookup('pipe', 'id -u') == '0' }}"
    tools:
      - name: codex
        binary: codex
        darwin:
          install:
            source: brew
            kind: cask
            package: codex
      - name: gh
        binary: gh
        darwin:
          install:
            source: brew
            kind: formula
            package: gh
      - name: lima
        binary: limactl
        darwin:
          install:
            source: brew
            kind: formula
            package: lima
      - name: lima-additional-guestagents
        binary: limactl
        darwin:
          install:
            source: brew
            kind: formula
            package: lima-additional-guestagents
      - name: fish
        binary: fish
        pixi:
          spec: fish
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: fish
      - name: neovim
        binary: nvim
        pixi:
          spec: nvim
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: neovim
      - name: tree-sitter-cli
        binary: tree-sitter
        pixi:
          spec: "tree-sitter-cli>=0.26.1"
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: tree-sitter-cli
      - name: tmux
        binary: tmux
        pixi:
          spec: tmux==3.6a
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: tmux
      - name: helix
        binary: hx
        pixi:
          spec: helix
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: helix
      - name: ripgrep
        binary: rg
        pixi:
          spec: ripgrep
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: ripgrep
      - name: tree
        binary: tree
        pixi:
          spec: tree
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: tree
      - name: fd
        binary: fd
        pixi:
          spec: fd-find
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: fd
      - name: git-lfs
        binary: git-lfs
        pixi:
          spec: git-lfs
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: git-lfs
      - name: qsv
        binary: qsv
        pixi:
          spec: qsv
          channel: conda-forge
          linux_arches:
            - x86_64
        darwin:
          install:
            source: brew
            kind: formula
            package: qsv
      - name: unzip
        binary: unzip
        pixi:
          spec: unzip
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: unzip
      - name: btop
        binary: btop
        pixi:
          spec: btop
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: btop
      - name: nushell
        binary: nu
        pixi:
          spec: nushell
          channel: conda-forge
        darwin:
          install:
            source: brew
            kind: formula
            package: nushell

  tasks:
    - name: Ensure configured global packages are installed via Pixi
      command: "{{ pixi_bin }} global install --channel {{ item.pixi.channel }} {{ item.pixi.spec }}"
      register: pixi_global_install
      loop: "{{ tools | selectattr('pixi', 'defined') | list }}"
      when:
        - codex_os != 'Darwin' or (item.darwin.install.source | default('pixi')) != 'brew'
        - codex_os != 'Linux' or codex_arch in (item.pixi.linux_arches | default(['x86_64', 'aarch64', 'arm64']))
      changed_when: "'already installed' not in (pixi_global_install.stdout | lower)"

    - name: Ensure local bin directory exists
      file:
        path: "{{ local_bin_dir }}"
        state: directory

    - name: Check whether system bubblewrap is already installed
      stat:
        path: /usr/bin/bwrap
      register: system_bwrap_stat
      when: codex_os == 'Linux'

    - name: Check whether passwordless sudo is available for system bubblewrap install
      shell: |
        set -euo pipefail
        if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
          echo true
        else
          echo false
        fi
      args:
        executable: /bin/bash
      register: bubblewrap_sudo_check
      changed_when: false
      when:
        - codex_os == 'Linux'
        - not bootstrap_is_root
        - not system_bwrap_stat.stat.exists

    - name: Ensure system bubblewrap is installed for Codex on Linux
      shell: |
        set -euo pipefail
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y bubblewrap
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y bubblewrap
        else
          echo "Unsupported Linux package manager for automatic bubblewrap install" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      become: true
      when:
        - codex_os == 'Linux'
        - not system_bwrap_stat.stat.exists
        - bootstrap_is_root or (bubblewrap_sudo_check.stdout | trim) == 'true'

    - name: Warn when system bubblewrap could not be installed automatically
      debug:
        msg: >-
          Codex expects system bubblewrap at /usr/bin/bwrap. Re-run this bootstrap
          as root or with passwordless sudo, or install bubblewrap with your distro
          package manager.
      when:
        - codex_os == 'Linux'
        - not system_bwrap_stat.stat.exists
        - not bootstrap_is_root
        - (bubblewrap_sudo_check.stdout | trim) != 'true'

    - name: Ensure bootstrap temporary directory exists
      tempfile:
        state: directory
        prefix: bootstrap-
        path: /tmp
      register: bootstrap_tmp_dir

    - name: Ensure global Git config is installed
      copy:
        src: "{{ playbook_dir }}/gitconfig"
        dest: "{{ lookup('env', 'HOME') }}/.gitconfig"
        mode: "0644"

    - name: Ensure OS and architecture are supported for rustup
      fail:
        msg: "Unsupported OS/architecture for rustup installer: {{ codex_os }} {{ codex_arch }}"
      when: rustup_target == ''

    - name: Check whether rustup is already installed
      stat:
        path: "{{ rustup_bin }}"
      register: rustup_stat

    - name: Download rustup-init binary
      shell: >
        curl -fsSL {{ rustup_download_url }} -o {{ bootstrap_tmp_dir.path }}/rustup-init &&
        chmod 0755 {{ bootstrap_tmp_dir.path }}/rustup-init
      args:
        executable: /bin/bash
      when: not rustup_stat.stat.exists

    - name: Download rustup-init checksum
      shell: >
        curl -fsSL {{ rustup_download_sha256_url }} -o {{ bootstrap_tmp_dir.path }}/rustup-init.sha256 &&
        chmod 0644 {{ bootstrap_tmp_dir.path }}/rustup-init.sha256
      args:
        executable: /bin/bash
      when: not rustup_stat.stat.exists

    - name: Verify rustup-init checksum
      shell: |
        set -euo pipefail
        expected="$(awk '{print $1}' "{{ bootstrap_tmp_dir.path }}/rustup-init.sha256")"
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "{{ bootstrap_tmp_dir.path }}/rustup-init" | awk '{print $1}')"
        else
          actual="$(shasum -a 256 "{{ bootstrap_tmp_dir.path }}/rustup-init" | awk '{print $1}')"
        fi
        test "$expected" = "$actual"
      args:
        executable: /bin/bash
      when: not rustup_stat.stat.exists

    - name: Install rustup and the stable toolchain
      command:
        argv:
          - "{{ bootstrap_tmp_dir.path }}/rustup-init"
          - -y
          - --default-toolchain
          - stable
          - --profile
          - default
          - --no-modify-path
      environment:
        CARGO_HOME: "{{ cargo_home }}"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ bootstrap_shell_path }}"
      when: not rustup_stat.stat.exists

    - name: Ensure the stable Rust toolchain is installed and current
      command:
        argv:
          - "{{ rustup_bin }}"
          - update
          - stable
      register: rustup_update_stable
      changed_when: >
        'unchanged' not in ((rustup_update_stable.stdout ~ '\n' ~ rustup_update_stable.stderr) | lower)
      environment:
        CARGO_HOME: "{{ cargo_home }}"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ bootstrap_shell_path }}"

    - name: Check the active rustup toolchain
      command:
        argv:
          - "{{ rustup_bin }}"
          - show
          - active-toolchain
      register: rustup_active_toolchain
      changed_when: false
      environment:
        CARGO_HOME: "{{ cargo_home }}"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ bootstrap_shell_path }}"

    - name: Ensure stable is the default Rust toolchain
      command:
        argv:
          - "{{ rustup_bin }}"
          - default
          - stable
      environment:
        CARGO_HOME: "{{ cargo_home }}"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ bootstrap_shell_path }}"
      when: not (rustup_active_toolchain.stdout | lower).startswith('stable')

    - name: Verify rustup, cargo, and rustc are discoverable
      shell: |
        set -euo pipefail
        command -v rustup
        command -v cargo
        command -v rustc
        rustup toolchain list | grep -q '^stable'
        rustup show active-toolchain | grep -q '^stable'
        cargo --version
        rustc --version
      args:
        executable: /bin/bash
      changed_when: false
      environment:
        CARGO_HOME: "{{ cargo_home }}"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ bootstrap_shell_path }}"

    - name: Ensure macOS Homebrew tools are installed
      shell: |
        if [[ "{{ item.darwin.install.kind }}" == "cask" ]]; then
          brew install --cask "{{ item.darwin.install.package }}"
        else
          brew install "{{ item.darwin.install.package }}"
        fi
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ brew_bin_prefix }}:{{ lookup('env', 'PATH') }}"
      loop: "{{ tools | selectattr('darwin.install.source', 'defined') | selectattr('darwin.install.source', 'equalto', 'brew') | list }}"
      when: codex_os == 'Darwin'

    - name: Verify macOS Homebrew tools are installed and discoverable
      shell: |
        if [[ "{{ item.darwin.install.kind }}" == "cask" ]]; then
          brew list --cask "{{ item.darwin.install.package }}" >/dev/null
        else
          brew list --formula "{{ item.darwin.install.package }}" >/dev/null
        fi
        PATH="{{ brew_bin_prefix }}:$PATH" command -v "{{ item.binary }}"
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ brew_bin_prefix }}:{{ lookup('env', 'PATH') }}"
      changed_when: false
      loop: "{{ tools | selectattr('darwin.install.source', 'defined') | selectattr('darwin.install.source', 'equalto', 'brew') | list }}"
      when: codex_os == 'Darwin'

    - name: Ensure macOS Homebrew tools are linked in local bin
      shell: |
        tool_path="$(PATH="{{ brew_bin_prefix }}:$PATH" command -v "{{ item.binary }}")"
        ln -sf "$tool_path" "{{ local_bin_dir }}/{{ item.binary }}"
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ brew_bin_prefix }}:{{ lookup('env', 'PATH') }}"
      loop: "{{ tools | selectattr('darwin.install.source', 'defined') | selectattr('darwin.install.source', 'equalto', 'brew') | list }}"
      when: codex_os == 'Darwin'

    - name: Verify tree-sitter CLI is new enough for nvim-treesitter
      shell: |
        set -euo pipefail
        command -v tree-sitter
        version="$(tree-sitter --version | sed -E 's/.* ([0-9]+)\.([0-9]+)\.([0-9]+).*/\1.\2.\3/')"
        IFS=. read -r major minor patch <<< "$version"
        if (( major > 0 || minor > 26 || (minor == 26 && patch >= 1) )); then
          exit 0
        fi
        echo "tree-sitter CLI $version is older than required 0.26.1" >&2
        exit 1
      args:
        executable: /bin/bash
      changed_when: false
      environment:
        PATH: "{{ bootstrap_shell_path }}"

    - name: Ensure Linux architecture is supported for Codex musl package
      fail:
        msg: "Unsupported Linux architecture for Codex musl release: {{ codex_arch }}"
      when:
        - codex_os == 'Linux'
        - codex_linux_arch == ''

    - name: Ensure Git LFS is initialized for the current user
      command:
        argv:
          - git
          - lfs
          - install
      changed_when: false
      environment:
        PATH: "{{ bootstrap_shell_path }}"

    - name: Ensure Linux architecture is supported for GitHub CLI release package
      fail:
        msg: "Unsupported Linux architecture for GitHub CLI release package: {{ codex_arch }}"
      when:
        - codex_os == 'Linux'
        - gh_linux_arch == ''

    - name: Get latest GitHub CLI release metadata
      command: "curl -fsSL {{ gh_release_api_url }}"
      register: gh_release_raw
      changed_when: false
      when: codex_os == 'Linux'

    - name: Parse GitHub CLI release metadata
      set_fact:
        gh_release: "{{ gh_release_raw.stdout | from_json }}"
      when: codex_os == 'Linux'

    - name: Set GitHub CLI release asset names
      set_fact:
        gh_version: "{{ gh_release.tag_name | regex_replace('^v', '') }}"
        gh_release_dir: "gh_{{ gh_release.tag_name | regex_replace('^v', '') }}_linux_{{ gh_linux_arch }}"
        gh_archive: "gh_{{ gh_release.tag_name | regex_replace('^v', '') }}_linux_{{ gh_linux_arch }}.tar.gz"
      when: codex_os == 'Linux'

    - name: Set GitHub CLI archive digest from release metadata
      set_fact:
        gh_archive_sha256: "{{ ((gh_release.assets | selectattr('name', 'equalto', gh_archive) | map(attribute='digest') | list | first) | default('')) | regex_replace('^sha256:', '') }}"
      when: codex_os == 'Linux'

    - name: Ensure GitHub CLI archive digest exists in release metadata
      fail:
        msg: "Missing sha256 digest for {{ gh_archive }} in GitHub CLI release metadata."
      when:
        - codex_os == 'Linux'
        - gh_archive_sha256 == ''

    - name: Download latest GitHub CLI Linux archive
      command: >
        curl -fsSL
        -o {{ bootstrap_tmp_dir.path }}/{{ gh_archive }}
        https://github.com/cli/cli/releases/download/{{ gh_release.tag_name }}/{{ gh_archive }}
      changed_when: true
      when: codex_os == 'Linux'

    - name: Verify GitHub CLI Linux archive checksum
      shell: |
        set -euo pipefail
        expected="{{ gh_archive_sha256 }}"
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "{{ bootstrap_tmp_dir.path }}/{{ gh_archive }}" | awk '{print $1}')"
        else
          actual="$(shasum -a 256 "{{ bootstrap_tmp_dir.path }}/{{ gh_archive }}" | awk '{print $1}')"
        fi
        test "$expected" = "$actual"
      args:
        executable: /bin/bash
      when: codex_os == 'Linux'

    - name: Extract latest GitHub CLI Linux archive
      shell: >
        tar -xzf {{ bootstrap_tmp_dir.path }}/{{ gh_archive }}
        -C {{ bootstrap_tmp_dir.path }}
      args:
        executable: /bin/bash
      when: codex_os == 'Linux'

    - name: Install GitHub CLI binary to local bin on Linux
      shell: >
        install -m 0755
        {{ bootstrap_tmp_dir.path }}/{{ gh_release_dir }}/bin/gh
        {{ local_bin_dir }}/gh
      args:
        executable: /bin/bash
      when: codex_os == 'Linux'

    - name: Download latest Codex Linux musl archive
      command: >
        curl -fsSL
        -o {{ bootstrap_tmp_dir.path }}/{{ codex_linux_asset }}
        {{ codex_linux_download_url }}
      changed_when: true
      when: codex_os == 'Linux'

    - name: Extract latest Codex Linux musl archive
      shell: >
        tar -xzf {{ bootstrap_tmp_dir.path }}/{{ codex_linux_asset }}
        -C {{ bootstrap_tmp_dir.path }}
      args:
        executable: /bin/bash
      when: codex_os == 'Linux'

    - name: Install Codex binary to local bin on Linux
      shell: >
        install -m 0755
        {{ bootstrap_tmp_dir.path }}/codex-{{ codex_linux_arch }}-unknown-linux-musl
        {{ local_bin_dir }}/codex
      args:
        executable: /bin/bash
      when: codex_os == 'Linux'

    - name: Bootstrap Neovim config from kickstart.nvim
      shell: git clone https://github.com/nvim-lua/kickstart.nvim.git "${XDG_CONFIG_HOME:-$HOME/.config}"/nvim
      args:
        creates: "{{ (lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') ~ '/.config', true)) ~ '/nvim/.git' }}"
        executable: /bin/bash

    - name: Ensure kickstart uses current Mason package name for Lua LS
      replace:
        path: "{{ (lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') ~ '/.config', true)) ~ '/nvim/init.lua' }}"
        regexp: "'lua_ls', -- Lua Language server"
        replace: "'lua-language-server', -- Lua Language server"

    - name: Ensure kickstart colorscheme plugin is catppuccin
      replace:
        path: "{{ (lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') ~ '/.config', true)) ~ '/nvim/init.lua' }}"
        regexp: "(?s)\\{ -- You can easily change to a different colorscheme\\..*?\\n  \\},"
        replace: '  { "catppuccin/nvim", name = "catppuccin", priority = 1000, init = function() vim.cmd.colorscheme "catppuccin-latte" end },'

    - name: Ensure existing one-line catppuccin entry uses latte config
      lineinfile:
        path: "{{ (lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') ~ '/.config', true)) ~ '/nvim/init.lua' }}"
        search_string: '{ "catppuccin/nvim", name = "catppuccin", priority = 1000 },'
        line: '    { "catppuccin/nvim", name = "catppuccin", priority = 1000, init = function() vim.cmd.colorscheme "catppuccin-latte" end },'

    - name: Ensure kickstart declares nvim-treesitter parser registry dependency
      replace:
        path: "{{ (lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') ~ '/.config', true)) ~ '/nvim/init.lua' }}"
        regexp: "(    'nvim-treesitter/nvim-treesitter',\\n)(?!    dependencies = \\{ 'neovim-treesitter/treesitter-parser-registry' \\},\\n)"
        replace: "\\1    dependencies = { 'neovim-treesitter/treesitter-parser-registry' },\\n"

    - name: Ensure kickstart uses current nvim-treesitter lazy spec
      replace:
        path: "{{ (lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') ~ '/.config', true)) ~ '/nvim/init.lua' }}"
        regexp: "(    'nvim-treesitter/nvim-treesitter',\\n    dependencies = \\{ 'neovim-treesitter/treesitter-parser-registry' \\},\\n)(?:    lazy = false,\\n)?(?:    build = ':TSUpdate',\\n)?(?:    branch = 'main',\\n)?"
        replace: "\\1    lazy = false,\\n    build = ':TSUpdate',\\n    branch = 'main',\\n"

    - name: Ensure kickstart uses current nvim-treesitter install API
      replace:
        path: "{{ (lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') ~ '/.config', true)) ~ '/nvim/init.lua' }}"
        regexp: "require\\('nvim-treesitter\\.install'\\)\\.ensure_installed\\(([^)]+)\\)"
        replace: "require('nvim-treesitter').install(\\1)"

    - name: Sync Neovim plugins headlessly
      shell: nvim --headless "+Lazy! sync" +qa
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ bootstrap_shell_path }}"

    - name: Check nvim-treesitter health
      shell: nvim --headless "+checkhealth nvim-treesitter" +qa
      args:
        executable: /bin/bash
      changed_when: false
      environment:
        PATH: "{{ bootstrap_shell_path }}"

    - name: Ensure Helix config directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.config/helix"
        state: directory

    - name: Ensure Helix config is installed
      copy:
        src: "{{ playbook_dir }}/helix/config.toml"
        dest: "{{ lookup('env', 'HOME') }}/.config/helix/config.toml"
        mode: "0644"

    - name: Ensure Codex config directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.codex"
        state: directory
        mode: "0700"

    - name: Ensure Codex shared defaults are merged into local config
      command:
        argv:
          - "{{ ansible_playbook_python }}"
          - "{{ playbook_dir }}/codex/sync_config.py"
          - --source
          - "{{ playbook_dir }}/codex/config.toml"
          - --dest
          - "{{ lookup('env', 'HOME') }}/.codex/config.toml"
      register: codex_config_sync
      changed_when: "'changed=true' in codex_config_sync.stdout"

    - name: Ensure Catppuccin tmux plugin directory exists
      file:
        path: "{{ catppuccin_tmux_dest }}"
        state: directory

    - name: Ensure Fish themes directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.config/fish/themes"
        state: directory

    - name: Ensure Fish completions directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.config/fish/completions"
        state: directory

    - name: Ensure Fish conf.d directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.config/fish/conf.d"
        state: directory

    - name: Ensure Pixi fish completion is installed
      shell: "{{ pixi_bin }} completion --shell fish > {{ lookup('env', 'HOME') }}/.config/fish/completions/pixi.fish"
      args:
        executable: /bin/bash

    - name: Ensure Fish path conf.d snippet is installed
      copy:
        src: "{{ playbook_dir }}/fish/conf.d/00-paths.fish"
        dest: "{{ lookup('env', 'HOME') }}/.config/fish/conf.d/00-paths.fish"
        mode: "0644"

    - name: Ensure fish config is installed
      copy:
        src: "{{ playbook_dir }}/config.fish"
        dest: "{{ lookup('env', 'HOME') }}/.config/fish/config.fish"
        mode: "0644"

    - name: Ensure Catppuccin fish theme is installed
      git:
        repo: https://github.com/catppuccin/fish.git
        dest: "{{ catppuccin_fish_dest }}"
        update: true

    - name: Check for Catppuccin Latte static fish theme file
      stat:
        path: "{{ catppuccin_fish_dest }}/themes/static/catppuccin-latte.theme"
      register: catppuccin_fish_theme_static_latte

    - name: Check for Catppuccin Latte fish theme file
      stat:
        path: "{{ catppuccin_fish_dest }}/themes/catppuccin-latte.theme"
      register: catppuccin_fish_theme_latte

    - name: Ensure Catppuccin Latte fish theme file exists
      fail:
        msg: >-
          Could not find catppuccin-latte.theme in {{ catppuccin_fish_dest }}/themes/static
          or {{ catppuccin_fish_dest }}/themes.
      when:
        - not catppuccin_fish_theme_static_latte.stat.exists
        - not catppuccin_fish_theme_latte.stat.exists

    - name: Remove legacy Catppuccin fish theme links
      file:
        path: "{{ lookup('env', 'HOME') }}/.config/fish/themes/{{ item }}"
        state: absent
      loop:
        - Catppuccin Latte.theme
        - Catppuccin Frappe.theme
        - Catppuccin Macchiato.theme
        - Catppuccin Mocha.theme
        - catppuccin-frappe.theme
        - catppuccin-macchiato.theme
        - catppuccin-mocha.theme

    - name: Ensure Catppuccin Latte fish theme file is linked
      file:
        src: >-
          {{
            (catppuccin_fish_dest ~ '/themes/static/catppuccin-latte.theme')
            if catppuccin_fish_theme_static_latte.stat.exists
            else (catppuccin_fish_dest ~ '/themes/catppuccin-latte.theme')
          }}
        dest: "{{ lookup('env', 'HOME') }}/.config/fish/themes/catppuccin-latte.theme"
        state: link
        force: true
        follow: false

    - name: Ensure Catppuccin fish theme is set to Latte
      shell: |
        rm -f "${XDG_CONFIG_HOME:-$HOME/.config}/fish/conf.d/fish_frozen_theme.fish"
        fish -c 'fish_config theme choose "catppuccin-latte"'
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ bootstrap_shell_path }}"
      changed_when: false

    - name: Ensure btop config directories exist
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ lookup('env', 'HOME') }}/.config/btop"
        - "{{ lookup('env', 'HOME') }}/.config/btop/themes"

    - name: Ensure Catppuccin btop theme is installed
      git:
        repo: https://github.com/catppuccin/btop.git
        dest: "{{ catppuccin_btop_dest }}"
        update: true

    - name: Ensure Catppuccin btop Latte theme file is installed
      shell: |
        latte_file="$(find "{{ catppuccin_btop_dest }}/themes" -maxdepth 1 -type f -iname '*latte*.theme' | head -n 1)"
        test -n "$latte_file"
        cp "$latte_file" "{{ lookup('env', 'HOME') }}/.config/btop/themes/catppuccin_latte.theme"
      args:
        executable: /bin/bash

    - name: Ensure btop uses Catppuccin Latte theme
      lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.config/btop/btop.conf"
        regexp: '^color_theme ='
        line: 'color_theme = "catppuccin_latte.theme"'
        create: true

    - name: Ensure Catppuccin tmux plugin is installed
      git:
        repo: https://github.com/catppuccin/tmux.git
        dest: "{{ catppuccin_tmux_dest }}"
        version: "{{ catppuccin_tmux_version }}"
        refspec: "+refs/tags/*:refs/tags/*"
        force: true
        update: true

    - name: Ensure tmux config is installed
      copy:
        src: "{{ playbook_dir }}/tmux.conf"
        dest: "{{ lookup('env', 'HOME') }}/.tmux.conf"
        mode: "0644"

    - name: Ensure ghostty config directory is installed
      copy:
        src: "{{ playbook_dir }}/ghostty/"
        dest: "{{ lookup('env', 'HOME') }}/.config/ghostty/"
        mode: preserve

    - name: Ensure terminfo directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.terminfo"
        state: directory

    - name: Ensure terminfo entries are installed
      copy:
        src: "{{ playbook_dir }}/terminfo/"
        dest: "{{ lookup('env', 'HOME') }}/.terminfo/"
        mode: preserve

    - name: Remove bootstrap temporary directory
      file:
        path: "{{ bootstrap_tmp_dir.path }}"
        state: absent
